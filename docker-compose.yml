# Unified root docker-compose — all builds use context: . (repo root)
# so every Dockerfile can access _shared/ and the root package-lock.json.
#
# Usage: docker compose up --build
# Env:   create a root .env with POSTGRES_*, RABBITMQ_*, PORT vars,
#        or run: docker compose --env-file api/.env up --build

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    command: ["php", "-d", "upload_max_filesize=10G", "-d", "post_max_size=10G", "-S", "[::]:8080", "-t", "/var/www/html"]

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBIT_PORT:-5672}:5672"
      - "${RABBIT_WEB_PORT:-15672}:15672"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running", "-q"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      target: production
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./api/.env
    ports:
      - "${PORT:-3000}:3000"
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
      target: production
    env_file:
      - ./bot/.env
    restart: unless-stopped
    volumes:
      - session-data:/app/bot/sessions

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
      target: final
    env_file:
      - ./worker/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep node || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  session-data:
